<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Schedule · Tutor Dashboard</title>
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }

        /* main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        /* navigation */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        /* loading spinner */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 1.2rem;
        }

        /* schedule grid */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-5px);
        }

        .day-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid #f0f0f0;
        }

        .day-icon {
            font-size: 2rem;
        }

        .day-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .tutor-count {
            margin-left: auto;
            background: #667eea;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* tutor items */
        .tutor-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tutor-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.2s ease;
        }

        .tutor-item:hover {
            background: #f0f3f8;
            transform: scale(1.02);
        }

        .tutor-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .tutor-details {
            display: flex;
            gap: 1rem;
            color: #666;
            font-size: 0.95rem;
        }

        .tutor-subject {
            background: #e3f2fd;
            color: #1976d2;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .tutor-time {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .tutor-time::before {
            content: "⏰";
            margin-right: 0.25rem;
        }

        .empty-day {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-style: italic;
        }

        /* stats bar */
        .stats-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            color: white;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* error message */
        .error-container {
            background: rgba(255, 99, 99, 0.9);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            color: white;
            margin: 2rem 0;
        }

        .retry-btn {
            background: white;
            color: #ff5757;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* footer */
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .last-updated {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Full Schedule</h1>
            <div class="subtitle">Complete tutor schedule from database</div>
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="add.html" class="nav-link">➕ Add Tutor</a>
            <a href="see.html" class="nav-link active">📅 Full Schedule</a>
            <a href="today.html" class="nav-link">⭐ Today</a>
            <a href="tutors.html" class="nav-link">👥 All Tutors</a>
        </div>

        <!-- Stats Bar (dynamic) -->
        <div class="stats-bar" id="statsBar" style="display: none;">
            <div class="stat-item">
                <div class="stat-value" id="totalTutors">0</div>
                <div class="stat-label">Total Tutors</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalDays">0</div>
                <div class="stat-label">Days with Sessions</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="busiestDay">-</div>
                <div class="stat-label">Busiest Day</div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching schedule from database...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error-container" style="display: none;">
            <h3>⚠️ Failed to Load Schedule</h3>
            <p id="errorMessage">Could not connect to the server.</p>
            <button class="retry-btn" onclick="fetchSchedule()">🔄 Try Again</button>
        </div>

        <!-- Schedule Grid -->
        <div id="scheduleContainer" style="display: none;">
            <div class="schedule-grid" id="scheduleGrid"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:5000';

        // Days in order
        const DAYS_ORDER = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // Day icons mapping
        const DAY_ICONS = {
            'Monday': '📅',
            'Tuesday': '📆',
            'Wednesday': '📌',
            'Thursday': '📋',
            'Friday': '🎉',
            'Saturday': '🎈',
            'Sunday': '🌟'
        };

        async function fetchSchedule() {
            // Show loading, hide error and schedule
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('scheduleContainer').style.display = 'none';
            document.getElementById('statsBar').style.display = 'none';

            try {
                // Fetch full schedule from backend
                const response = await axios.get(`${BASE_URL}/api/get-full`);
                
                console.log('Schedule data:', response.data);
                
                if (response.data && response.data.schedule) {
                    displaySchedule(response.data.schedule);
                    updateStats(response.data.schedule);
                    updateLastUpdated();
                } else {
                    throw new Error('Invalid response format');
                }

            } catch (error) {
                console.error('Error fetching schedule:', error);
                
                // Show error message
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                
                let errorMsg = 'Could not connect to the server.';
                if (error.response) {
                    errorMsg = error.response.data.message || `Server error: ${error.response.status}`;
                } else if (error.request) {
                    errorMsg = 'No response from server. Make sure backend is running on port 5000.';
                } else {
                    errorMsg = error.message;
                }
                
                document.getElementById('errorMessage').textContent = errorMsg;
            }
        }

        function displaySchedule(scheduleData) {
            const scheduleGrid = document.getElementById('scheduleGrid');
            scheduleGrid.innerHTML = '';

            // Group tutors by day
            const tutorsByDay = {};
            DAYS_ORDER.forEach(day => {
                tutorsByDay[day] = [];
            });

            scheduleData.forEach(tutor => {
                if (tutor.day && tutorsByDay.hasOwnProperty(tutor.day)) {
                    tutorsByDay[tutor.day].push(tutor);
                }
            });

            // Create day cards
            DAYS_ORDER.forEach(day => {
                const tutors = tutorsByDay[day];
                const dayCard = createDayCard(day, tutors);
                scheduleGrid.appendChild(dayCard);
            });

            // Show schedule and hide loading
            document.getElementById('loading').style.display = 'none';
            document.getElementById('scheduleContainer').style.display = 'block';
            document.getElementById('statsBar').style.display = 'flex';
        }

        function createDayCard(day, tutors) {
            const card = document.createElement('div');
            card.className = 'day-card';

            // Day header
            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML = `
                <span class="day-icon">${DAY_ICONS[day] || '📅'}</span>
                <span class="day-title">${day}</span>
                <span class="tutor-count">${tutors.length}</span>
            `;

            // Tutor list
            const tutorList = document.createElement('div');
            tutorList.className = 'tutor-list';

            if (tutors.length === 0) {
                const emptyMessage = document.createElement('div');
                emptyMessage.className = 'empty-day';
                emptyMessage.textContent = 'No tutors scheduled';
                tutorList.appendChild(emptyMessage);
            } else {
                // Sort tutors by hourFrom
                tutors.sort((a, b) => {
                    return (a.hourFrom || '').localeCompare(b.hourFrom || '');
                });

                tutors.forEach(tutor => {
                    const tutorItem = document.createElement('div');
                    tutorItem.className = 'tutor-item';
                    tutorItem.innerHTML = `
                        <div class="tutor-name">${escapeHtml(tutor.name)}</div>
                        <div class="tutor-details">
                            <span class="tutor-subject">${escapeHtml(tutor.subject)}</span>
                            <span class="tutor-time">${escapeHtml(tutor.hourFrom || '')} - ${escapeHtml(tutor.hourTo || '')}</span>
                        </div>
                    `;
                    tutorList.appendChild(tutorItem);
                });
            }

            card.appendChild(header);
            card.appendChild(tutorList);
            
            return card;
        }

        function updateStats(scheduleData) {
            const totalTutors = scheduleData.length;
            document.getElementById('totalTutors').textContent = totalTutors;

            // Count tutors per day
            const dayCounts = {};
            DAYS_ORDER.forEach(day => dayCounts[day] = 0);
            
            scheduleData.forEach(tutor => {
                if (tutor.day) {
                    dayCounts[tutor.day] = (dayCounts[tutor.day] || 0) + 1;
                }
            });

            const daysWithTutors = Object.values(dayCounts).filter(count => count > 0).length;
            document.getElementById('totalDays').textContent = daysWithTutors;

            // Find busiest day
            let busiestDay = 'None';
            let maxCount = 0;
            
            for (const [day, count] of Object.entries(dayCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    busiestDay = day;
                }
            }

            document.getElementById('busiestDay').textContent = maxCount > 0 ? `${busiestDay} (${maxCount})` : 'None';
        }

        function updateLastUpdated() {
            const now = new Date();
            const formattedTime = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            const formattedDate = now.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
            
            document.getElementById('lastUpdated').innerHTML = 
                `⏱️ Last updated: ${formattedDate} at ${formattedTime}`;
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-refresh every 30 seconds (optional)
        let refreshInterval;
        
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchSchedule, 30000);
        }

        // Initial fetch
        fetchSchedule();
        startAutoRefresh();

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
