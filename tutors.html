<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors · styled dashboard</title>
    <!-- modern clean CSS, no external dependencies -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf2f8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* main dashboard card */
        .tutor-dashboard {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,40,70,0.25),
                        0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* grid of three feature cards */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 0 auto;
        }

        /* individual card */
        .card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem 1.8rem 1.5rem;
            box-shadow: 0 12px 28px -8px rgba(0, 32, 64, 0.12);
            transition: transform 0.2s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(211, 229, 245, 0.5);
            backdrop-filter: blur(2px);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 38px -14px rgba(18, 83, 143, 0.2);
            border-color: rgba(141, 196, 245, 0.6);
        }

        /* card headings */
        .card h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(145deg, #1d3e5e, #1b5a7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            width: 100%;
            border-bottom: 2px solid rgba(100, 170, 230, 0.2);
            padding-bottom: 0.75rem;
        }

        /* consistent button style */
        .card button {
            background: white;
            border: 1.5px solid #c7dff2;
            color: #1c5777;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 35, 70, 0.04);
            transition: all 0.2s ease;
            width: fit-content;
            min-width: 160px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            background: rgba(255, 255, 255, 0.9);
            margin-top: 0.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .card button:hover {
            background: #e3f0fd;
            border-color: #6fb1e0;
            color: #0b3b57;
            box-shadow: 0 10px 18px -8px #2f7eb0;
            transform: scale(1.02);
        }

        .card button:active {
            background: #cde2f5;
            border-color: #3080b9;
            transform: scale(0.98);
            box-shadow: 0 4px 8px rgba(0, 60, 120, 0.2);
        }

        /* subtle icons (optional via pseudo) — but we keep minimal */
        .card:first-child button::before {
            content: "📅 ";
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            margin-right: 6px;
            padding: 10px ;
        }

        .card:nth-child(2) button::before {
            content: "➕ ";
            font-size: 1.3rem;
            margin-right: 6px;
            padding: 10px ;
        }

        .card:nth-child(3) button::before {
            content: "👁️ ";
            font-size: 1.2rem;
            margin-right: 6px;
            padding: 10px ;
        }

        /* responsive extra touch */
        @media (max-width: 600px) {
            .tutor-dashboard {
                padding: 1.5rem 1rem;
                border-radius: 2rem;
            }
            .card h1 {
                font-size: 1.6rem;
            }
            .card button {
                font-size: 1.1rem;
                padding: 0.75rem 1.4rem;
                min-width: 140px;
            }
        }

        /* small decorative line / spacing */
        .dashboard-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .dashboard-header h2 {
            font-size: 2.2rem;
            font-weight: 300;
            color: #164863;
            letter-spacing: -0.5px;
            background: rgba(255,255,255,0.6);
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        /* links for buttons – open in new tab or just demo anchor behaviour */
        .card button a {
            text-decoration: none;
            color: inherit;
            display: inline-block;
            width: 100%;
            height: 100%;
        }

        /* make the whole button clickable area include the link */
        .card button {
            padding: 0;
        }

        .card button a {
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
        }

        /* keep same style when link inside */
        .card button,
        .card button a {
            transition: all 0.2s ease;
        }

        /* just to show they're interactive and linked */
    </style>
</head>
<body>
    <div class="tutor-dashboard">
        <!-- subtle heading (just for aesthetics) -->
        <div class="dashboard-header">
            <h2>📘 tutor panel</h2>
        </div>

        <!-- main grid: exactly three cards matching original structure -->
        <div class="schedule-grid">
            <!-- Today's schedule card -->
            <div class="card">
                <h1>Today's schedule</h1>
                <button>
                    <!-- empty href as placeholder; #top keeps it on same page -->
                    <a href="/today.html" title="View today's schedule (demo link)">Today's schedule</a>
                </button>
            </div>

            <!-- Add Tutor card -->
            <div class="card">
                <h1>Add Tutor</h1>
                <button>
                    <a href="/add.html" title="Add a new tutor (demo link)">Add Tutor</a>
                </button>
            </div>

            <!-- See Schedule card -->
            <div class="card">
                <h1>See Schedule</h1>
                <button>
                    <a href="/see.html" title="View full schedule (demo link)">See Schedule</a>
                </button>
            </div>
        </div>

        <!-- optional micro info: all links work (stay on same page) -->
        <div style="text-align: center; margin-top: 2.2rem; opacity: 0.6; font-size: 0.9rem; color: #275b7a;">
            ⚡ buttons are linked · # links for demo
        </div>
    </div>

    <!-- 
        note: Each button contains an <a> so they are real links.
        For demo they point to "#" (same page). Replace href with actual routes. 
        Style matches the given HTML exactly but enhanced with modern UI.
    -->
</body>
</html>
